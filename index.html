

<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge 2048</title>
<style>
body{font-family:Arial,sans-serif;background:#faf8ef;display:flex;flex-direction:column;align-items:center;padding:20px;margin:0}
h1{font-size:48px;color:#776e65;margin:10px 0}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#bbada0;padding:10px;border-radius:6px;width:280px;height:280px}
.cell{width:60px;height:60px;background:#cdc1b4;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#776e65}
.cell[data-val="2"]{background:#eee4da}
.cell[data-val="4"]{background:#ede0c8}
.cell[data-val="8"]{background:#f2b179;color:#f9f6f2}
.cell[data-val="16"]{background:#f59563;color:#f9f6f2}
.cell[data-val="32"]{background:#f67c5f;color:#f9f6f2}
.cell[data-val="64"]{background:#f65e3b;color:#f9f6f2}
button{background:#8f7a66;color:#f9f6f2;border:none;padding:10px 20px;border-radius:3px;font-size:18px;cursor:pointer;margin-top:15px}
</style>
</head>
<body>
<h1>Merge 2048</h1>
<div>Score: <span id="score">0</span></div>
<div id="grid"></div>
<button onclick="newGame()">New Game</button>
<script>
let board,score;
function newGame(){
  board=Array(4).fill().map(()=>Array(4).fill(0));
  score=0;
  addTile();addTile();
  draw();
}
function addTile(){
  let empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(board[r][c]==0)empty.push([r,c]);
  if(empty.length){
    let [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }
}
function draw(){
  document.getElementById('score').textContent=score;
  let g=document.getElementById('grid');
  g.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    let v=board[r][c];
    let d=document.createElement('div');
    d.className='cell';
    if(v){d.textContent=v;d.setAttribute('data-val',v);}
    g.appendChild(d);
  }
}
function move(dir){
  let moved=false;
  if(dir=='up'||dir=='down'){
    for(let c=0;c<4;c++){
      let col=[board[0][c],board[1][c],board[2][c],board[3][c]];
      let res=slide(col,dir=='up');
      if(res.moved)moved=true;
      [board[0][c],board[1][c],board[2][c],board[3][c]]=res.arr;
    }
  }else{
    for(let r=0;r<4;r++){
      let res=slide(board[r],dir=='left');
      if(res.moved)moved=true;
      board[r]=res.arr;
    }
  }
  if(moved){addTile();draw();}
function slide(arr,reverse){
  let a=reverse?arr.slice().reverse():arr.slice();
  a=a.filter(x=>x);
  for(let i=0;i<a.length-1;i++){
    if(a[i]==a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);}
  }
  while(a.length<4)a.push(0);
  if(reverse)a.reverse();
  return{moved:JSON.stringify(a)!=JSON.stringify(arr),arr:a};
}
document.addEventListener('keydown',e=>{
  if(e.key.startsWith('Arrow'))move(e.key.slice(5).toLowerCase());
});
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
});
document.addEventListener('touchend',e=>{
  let touchEndX=e.changedTouches[0].clientX;
  let touchEndY=e.changedTouches[0].clientY;
  let diffX=touchEndX-touchStartX;
  let diffY=touchEndY-touchStartY;
  if(Math.abs(diffX)>Math.abs(diffY)){
    if(diffX>50)move('right');
    if(diffX<-50)move('left');
  }else{
    if(diffY>50)move('down');
    if(diffY<-50)move('up');
  }
});
newGame();
</script>
</body>
</html>
