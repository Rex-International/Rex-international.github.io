<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge 2048</title>
<style>
body{font-family:Arial;background:#faf8ef;display:flex;flex-direction:column;align-items:center;padding:20px;touch-action:none}
h1{color:#776e65}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#bbada0;padding:10px;border-radius:6px;width:280px;height:280px}
.tile{width:60px;height:60px;background:#cdc1b4;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#776e65}
.tile[data-val="2"]{background:#eee4da}
.tile[data-val="4"]{background:#ede0c8}
.tile[data-val="8"]{background:#f2b179;color:#fff}
.tile[data-val="16"]{background:#f59563;color:#fff}
button{margin-top:15px;padding:10px 20px;background:#8f7a66;color:#fff;border:none;border-radius:3px;font-size:16px}
</style>
</head>
<body>
<h1>Merge 2048</h1>
<div>Score: <span id="score">0</span></div>
<div id="grid"></div>
<button onclick="newGame()">New Game</button>
<script>
let board,score;
function newGame(){
  board=Array(4).fill().map(()=>Array(4).fill(0));
  score=0;addTile();addTile();draw();
}
function addTile(){
  let empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(board[r][c]==0)empty.push([r,c]);
  if(empty.length){
    let [r,c]=empty[Math.floor(Math.random()*empty.length)];
    board[r][c]=Math.random()<0.9?2:4;
  }
}
function draw(){
  document.getElementById('score').textContent=score;
  let g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    let v=board[r][c];let d=document.createElement('div');
    d.className='tile';if(v){d.textContent=v;d.setAttribute('data-val',v);}
    g.appendChild(d);
  }
}
function move(dir){
  let changed=false;
  if(dir=='left' || dir=='right'){
    for(let r=0;r<4;r++){
      let row=board[r].filter(x=>x);
      if(dir=='right')row.reverse();
      for(let i=0;i<row.length-1;i++){
        if(row[i]==row[i+1]){row[i]*=2;score+=row[i];row.splice(i+1,1);}
      }
      while(row.length<4)row.push(0);
      if(dir=='right')row.reverse();
      if(row.join()!=board[r].join())changed=true;
      board[r]=row;
    }
  }
  if(dir=='up' || dir=='down'){
    for(let c=0;c<4;c++){
      let col=[board[0][c],board[1][c],board[2][c],board[3][c]].filter(x=>x);
      if(dir=='down')col.reverse();
      for(let i=0;i<col.length-1;i++){
        if(col[i]==col[i+1]){col[i]*=2;score+=col[i];col.splice(i+1,1);}
      }
      while(col.length<4)col.push(0);
      if(dir=='down')col.reverse();
      for(let r=0;r<4;r++){
        if(board[r][c]!=col[r])changed=true;
        board[r][c]=col[r];
      }
    }
  }
  if(changed){addTile();draw();}
}
document.addEventListener('keydown',e=>{
  if(e.key=='ArrowLeft')move('left');
  if(e.key=='ArrowRight')move('right');
  if(e.key=='ArrowUp')move('up');
  if(e.key=='ArrowDown')move('down');
});
let startX,startY;
document.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;});
document.addEventListener('touchend',e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>30 || Math.abs(dy)>30){
    if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  }
});
newGame();
</script>
</body>
</html>
