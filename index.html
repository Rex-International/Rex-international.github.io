<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge 2048</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
body { background: #faf8ef; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
h1 { font-size: 48px; color: #776e65; margin-bottom: 10px; }
.game-info { display: flex; justify-content: space-between; width: 400px; margin-bottom: 20px; }
.score-box { background: #bbada0; padding: 10px 20px; border-radius: 6px; color: white; text-align: center; }
.score-label { font-size: 12px; font-weight: bold; }
.score-value { font-size: 24px; font-weight: bold; }
.game-container { width: 400px; height: 400px; background: #bbada0; border-radius: 6px; padding: 10px; position: relative; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; height: 100%; }
.cell { background: rgba(238, 228, 218, 0.35); border-radius: 3px; }
.tile { position: absolute; width: 92.5px; height: 92.5px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; transition: all 0.15s ease-in-out; }
.tile-2 { background: #eee4da; color: #776e65; }
.tile-4 { background: #ede0c8; color: #776e65; }
.tile-8 { background: #f2b179; color: #f9f6f2; }
.tile-16 { background: #f59563; color: #f9f6f2; }
.tile-32 { background: #f67c5f; color: #f9f6f2; }
.tile-64 { background: #f65e3b; color: #f9f6f2; }
.tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
.tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
.tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }
.controls { margin-top: 20px; display: flex; gap: 10px; }
button { padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 3px; font-size: 16px; cursor: pointer; font-weight: bold; }
button:hover { background: #9f8a76; }
.game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(238, 228, 218, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; }
.game-over.show { display: flex; }
.game-over h2 { font-size: 40px; color: #776e65; margin-bottom: 20px; }
.creator { margin-top: 20px; color: #776e65; font-size: 14px; }
@media (max-width: 420px) {
.game-container,.game-info { width: 300px; }
.game-container { height: 300px; }
.tile { width: 67.5px; height: 67.5px; font-size: 25px; }
.tile-128,.tile-256,.tile-512 { font-size: 20px; }
.tile-1024,.tile-2048 { font-size: 18px; }
h1 { font-size: 36px; }
}
</style>
</head>
<body>
<h1>Merge 2048</h1>
<div class="game-info">
<div class="score-box">
<div class="score-label">SCORE</div>
<div class="score-value" id="score">0</div>
</div>
<div class="score-box">
<div class="score-label">BEST</div>
<div class="score-value" id="bestScore">0</div>
</div>
</div>
<div class="game-container">
<div class="grid" id="grid"></div>
<div id="tiles"></div>
<div class="game-over" id="gameOver">
<h2>Game Over!</h2>
<button onclick="restartGame()">Jaribu Tena</button>
</div>
</div>
<div class="controls">
<button onclick="restartGame()">New Game</button>
</div>
<div class="creator">Made by Rex</div>
<script>
let board = [];
let score = 0;
let bestScore = localStorage.getItem('bestScore') || 0;
let tilesContainer = document.getElementById('tiles');
document.getElementById('bestScore').textContent = bestScore;

function initGame() {
board = Array(4).fill().map(() => Array(4).fill(0));
score = 0;
updateScore();
addRandomTile();
addRandomTile();
drawTiles();
}

function addRandomTile() {
let emptyTiles = [];
for (let i = 0; i < 4; i++) {
for (let j = 0; j < 4; j++) {
if (board[i][j] === 0) emptyTiles.push({x: i, y: j});
}
}
if (emptyTiles.length > 0) {
let randomTile = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
board[randomTile.x][randomTile.y] = Math.random() < 0.9? 2 : 4;
}
}

function drawTiles() {
tilesContainer.innerHTML = '';
for (let i = 0; i < 4; i++) {
for (let j = 0; j < 4; j++) {
if (board[i][j]!== 0) {
let tile = document.createElement('div');
tile.className = tile tile-${board[i][j]};
tile.style.left = (10 + j * 102.5) + 'px';
tile.style.top = (10 + i * 102.5) + 'px';
tile.textContent = board[i][j];
tilesContainer.appendChild(tile);
}
}
}
}

function updateScore() {
document.getElementById('score').textContent = score;
if (score > bestScore) {
bestScore = score;
document.getElementById('bestScore').textContent = bestScore;
localStorage.setItem('bestScore', bestScore);
}
}

function move(direction) {
let changed = false;
let newBoard = board.map(row => [...row]);
if (direction === 'left' || direction === 'right') {
for (let i = 0; i < 4; i++) {
let row = newBoard[i].filter(val => val!== 0);
if (direction === 'right') row.reverse();
for (let j = 0; j < row.length - 1; j++) {
if (row[j] === row[j + 1]) {
row[j] *= 2;
score += row[j];
row.splice(j + 1, 1);
}
}
while (row.length < 4) row.push(0);
if (direction === 'right') row.reverse();
if (JSON.stringify(row)!== JSON.stringify(newBoard[i])) changed = true;
newBoard[i] = row;
}
}
if (direction === 'up' || direction === 'down') {
for (let j = 0; j < 4; j++) {
let column = [];
for (let i = 0; i < 4; i++) {
if (newBoard[i][j]!== 0) column.push(newBoard[i][j]);
}
if (direction === 'down') column.reverse();
for (let i = 0; i < column.length - 1; i++) {
if (column[i] === column[i + 1]) {
column[i] *= 2;
score += column[i];
column.splice(i + 1, 1);
}
}
while (column.length < 4) column.push(0);
if (direction === 'down') column.reverse();
for (let i = 0; i < 4; i++) {
if (newBoard[i][j]!== column[i]) changed = true;
newBoard[i][j] = column[i];
}
}
}
if (changed) {
board = newBoard;
addRandomTile();
drawTiles();
updateScore();
if (isGameOver()) document.getElementById('gameOver').classList.add('show');
}
}

function isGameOver() {
for (let i = 0; i < 4; i++) {
for (let j = 0; j < 4; j++) {
if (board[i][j] === 0) return false;
if (j < 3 && board[i][j] === board[i][j + 1]) return false;
if (i < 3 && board[i][j] === board[i + 1][j]) return false;
}
}
return true;
}

function restartGame() {
document.getElementById('gameOver').classList.remove('show');
initGame();
}

document.addEventListener('keydown', (e) => {
switch(e.key) {
case 'ArrowLeft': move('left'); break;
case 'ArrowRight': move('right'); break;
case 'ArrowUp': move('up'); break;
case 'ArrowDown': move('down'); break;
}
});

let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
touchStartX = e.touches[0].clientX;
touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', (e) => {
let touchEndX = e.changedTouches[0].clientX;
let touchEndY = e.changedTouches[0].clientY;
let diffX = touchEndX - touchStartX;
let diffY = touchEndY - touchStartY;
if (Math.abs(diffX) > Math.abs(diffY)) {
if (diffX > 50) move('right');
if (diffX < -50) move('left');
} else {
if (diffY > 50) move('down');
if (diffY < -50) move('up');
}
});

const grid = document.getElementById('grid');
for (let i = 0; i < 16; i++) {
let cell = document.createElement('div');
cell.className = 'cell';
grid.appendChild(cell);
}
initGame();
</script>
</body>
</html>
