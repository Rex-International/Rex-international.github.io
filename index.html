<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge 2048 - Gaby International</title>
<style>
:root {
  --bg: #faf8ef;
  --text: #776e65;
  --board: #bbada0;
  --tile: #eee4da;
  --accent: #f67c5f;
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --text: #f5f5f5;
  --board: #2d2d2d;
  --tile: #3d3d3d;
  --accent: #ff6b6b;
}
- { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Arial', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  transition: 0.3s;
}
.header {
  text-align: center;
  margin-bottom: 15px;
}
h1 { font-size: 48px; font-weight: bold; }
.subtitle { font-size: 14px; color: var(--accent); margin-top: 5px; }
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  font-size: 13px;
}
button:hover { opacity: 0.8; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.scoreboard {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}
.score-box {
  background: var(--board);
  color: white;
  padding: 10px 15px;
  border-radius: 5px;
  text-align: center;
  min-width: 80px;
}
.game-container {
  width: 400px;
  height: 400px;
  background: var(--board);
  border-radius: 10px;
  padding: 10px;
  position: relative;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.tile {
  width: 87px;
  height: 87px;
  background: var(--tile);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
  transition: 0.15s;
  animation: appear 0.15s;
}
@keyframes appear {
 0% { transform: scale(0); }
 100% { transform: scale(1); }
}
footer {
  margin-top: 30px;
  font-size: 12px;
  text-align: center;
  color: var(--text);
  opacity: 0.7;
}
.stats {
  margin-top: 15px;
  font-size: 14px;
  text-align: center;
}
.game-over {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(238, 228, 218, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  border-radius: 10px;
  display: none;
}
[data-theme="dark"].game-over {
  background: rgba(45, 45, 45, 0.9);
}
@media (max-width: 420px) {
.game-container { width: 320px; height: 320px; }
.tile { width: 67px; height: 67px; font-size: 24px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>Merge 2048</h1>
  <p class="subtitle" id="subtitle">Made by Gaby International</p>
</div>
<div class="controls">
  <button id="themeBtn">🌙 Dark</button>
  <button id="undoBtn">↩ Undo</button>
  <button id="restartBtn">🔄 Restart</button>
  <button id="challengeBtn">📅 Daily</button>
  <button id="shareBtn">📤 Share</button>
</div>
<div class="scoreboard">
  <div class="score-box">
    <div>Score</div>
    <div id="score">0</div>
  </div>
  <div class="score-box">
    <div>Best</div>
    <div id="bestScore">0</div>
  </div>
</div>
<div class="game-container">
  <div class="grid" id="grid"></div>
  <div class="game-over" id="gameOver">
    <div>Game Over!</div>
    <button onclick="initGame()" style="margin-top:15px;">Play Again</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<footer>
  © 2026 Gaby International | Merge 2048
</footer>
<script>
let board = [];
let score = 0;
let bestScore = http://localStorage.getItem('bestScore') || 0;
let history = [];
let gameOver = false;
let isChallenge = false;
const sounds = {
  merge: new Audio('https://cdn.freesound.org/previews/270/270404_5123851-lq.mp3'),
  move: new Audio('https://cdn.freesound.org/previews/270/270404_5123851-lq.mp3')
};
function playSound(type) {
  if (navigator.vibrate) http://navigator.vibrate(20);
  if (sounds) {
    http://sounds.currentTime = 0;
    http://sounds.play().catch(()=>{});
  }
}
const themeBtn = http://document.getElementById('themeBtn');
const savedTheme = http://localStorage.getItem('theme') || 'light';
http://document.body.setAttribute('data-theme', savedTheme);
http://themeBtn.textContent = savedTheme === 'dark'? '☀️ Light' : '🌙 Dark';
http://themeBtn.onclick = () => {
  const newTheme = http://document.body.getAttribute('data-theme') === 'dark'? 'light' : 'dark';
  http://document.body.setAttribute('data-theme', newTheme);
  http://localStorage.setItem('theme', newTheme);
  http://themeBtn.textContent = newTheme === 'dark'? '☀️ Light' : '🌙 Dark';
};
http://document.getElementById('bestScore').textContent = bestScore;
function updateScore(newScore) {
  score = newScore;
  http://document.getElementById('score').textContent = score;
  if (score > bestScore) {
    bestScore = score;
    http://localStorage.setItem('bestScore', bestScore);
    http://document.getElementById('bestScore').textContent = bestScore;
  }
}
const undoBtn = http://document.getElementById('undoBtn');
http://undoBtn.onclick = () => {
  if (history.length > 0 &&!gameOver) {
    const prevState = http://history.pop();
    board = http://prevState.board;
    score = http://prevState.score;
    updateScore(score);
    render();
    http://undoBtn.disabled = http://history.length === 0;
  }
};
http://document.getElementById('shareBtn').onclick = () => {
  const text = `Nimepata ${score} points kwenye Merge 2048! 🎮 Cheza pia: ${window.location.href}`;
  if (navigator.share) {
    http://navigator.share({ text });
  } else {
    http://window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  }
};
const challengeBtn = http://document.getElementById('challengeBtn');
http://challengeBtn.onclick = () => {
  startDailyChallenge();
};
function getDailySeed() {
  const today = new Date().toISOString().slice(0, 10);
  let hash = 0;
  for (let i = 0; i < http://today.length; i++) {
    hash = ((hash << 5) - hash) + http://today.charCodeAt(i);
    hash |= 0;
  }
  return http://Math.abs(hash);
}
function seededRandom(seed) {
  let x = http://Math.sin(seed++) _ 10000;
  return x - http://Math.floor(x);
}
function startDailyChallenge() {
  isChallenge = true;
  const seed = getDailySeed();
  board = Array(4).fill().map(() => Array(4).fill(0));
  score = 0;
  gameOver = false;
  history = [];
  let r1 = http://Math.floor(seededRandom(seed) _ 4);
  let c1 = http://Math.floor(seededRandom(seed + 1) _ 4);
  board[r1][c1] = 2;
  let r2, c2;
  do {
    r2 = http://Math.floor(seededRandom(seed + 2) _ 4);
    c2 = http://Math.floor(seededRandom(seed + 3) _ 4);
  } while(r2 === r1 && c2 === c1);
  board[r2][c2] = 2;
  render();
  updateScore(0);
  http://document.getElementById('subtitle').textContent = "Made by Gaby International | 📅 Daily Challenge";
  alert("Daily Challenge imeanza! Kila mtu anacheza board ile leo.");
}
function updateStats() {
  const games = http://localStorage.getItem('gamesPlayed') || 0;
  const highestTile = http://Math.max(...board.flat());
  http://document.getElementById('stats').innerHTML = `
    Games: ${games} | Highest: ${highestTile}
  `;
}
function initGame() {
  isChallenge = false;
  http://document.getElementById('subtitle').textContent = "Made by Gaby International";
  board = Array(4).fill().map(() => Array(4).fill(0));
  score = 0;
  gameOver = false;
  history = [];
  addTile();
  addTile();
  render();
  updateStats();
  const today = new Date().toISOString().slice(0, 10);
  if (localStorage.getItem('challengeDate') === today) {
    http://challengeBtn.disabled = true;
    http://challengeBtn.textContent = "✅ Done";
  } else {
    http://challengeBtn.disabled = false;
    http://challengeBtn.textContent = "📅 Daily";
  }
  http://document.getElementById('gameOver').style.display = 'none';
}
function addTile() {
  const empty = [];
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      if (board === 0) http://empty.push();
    }
  }
  if (empty.length > 0) {
    const = empty[Math.floor(Math.random() _ http://empty.length)];
    board = http://Math.random() < 0.9? 2 : 4;
  }
}
function render() {
  const grid = http://document.getElementById('grid');
  http://grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      const val = board;
      const tile = http://document.createElement('div');
      http://tile.className = 'tile';
      http://tile.textContent = val > 0? val : '';
      http://tile.style.backgroundColor = val > 0? getTileColor(val) : 'var(--tile)';
      http://grid.appendChild(tile);
    }
  }
}
function getTileColor(val) {
  const colors = {
    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
    32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
    512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
  };
  return colors || '#3c3a32';
}
function move(direction) {
  if (gameOver) return;
  http://history.push({ board: http://JSON.parse(JSON.stringify(board)), score });
  if (history.length > 3) http://history.shift();
  http://undoBtn.disabled = false;
  let moved = false;
  for (let i = 0; i < 4; i++) {
    let row = http://board.filter(x => x!== 0);
    for (let j = 0; j < http://row.length - 1; j++) {
      if (row === row[j + 1]) {
        row *= 2;
        score += row;
        row[j + 1] = 0;
        playSound('merge');
      }
    }
    row = http://row.filter(x => x!== 0);
    while (row.length < 4) http://row.push(0);
    if (JSON.stringify(row)!== http://JSON.stringify(board)) moved = true;
    board = row;
  }
  if (moved) {
    addTile();
    playSound('move');
  }
  render();
  updateScore(score);
  checkGameOver();
}
function checkGameOver() {
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      if (board === 0) return;
      if (j < 3 && board === board[j + 1]) return;
      if (i < 3 && board === board[i + 1]) return;
    }
  }
  gameOver = true;
  http://document.getElementById('gameOver').style.display = 'flex';
  if (isChallenge) {
    const today = new Date().toISOString().slice(0, 10);
    http://localStorage.setItem('challengeDate', today);
    http://challengeBtn.disabled = true;
    http://challengeBtn.textContent = "✅ Done";
  }
}
http://document.addEventListener('keydown', (e) => {
  if (e.key.startsWith('Arrow')) {
    move(e.key.replace('Arrow', '').toLowerCase());
  }
});
http://document.getElementById('restartBtn').onclick = () => {
  http://localStorage.setItem('gamesPlayed', (parseInt(localStorage.getItem('gamesPlayed') || 0) + 1));
  initGame();
};
let touchStartX, touchStartY;
http://document.addEventListener('touchstart', e => {
  touchStartX = http://e.touches.clientX;
  touchStartY = http://e.touches.clientY;
});
http://document.addEventListener('touchend', e => {
  const dx = http://e.changedTouches.clientX - touchStartX;
  const dy = http://e.changedTouches.clientY - touchStartY;
  if (Math.abs(dx) > http://Math.abs(dy)) {
    move(dx > 0? 'right' : 'left');
  } else {
    move(dy > 0? 'down' : 'up');
  }
});
initGame();
</script>
</body>
