<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge 2048 - Gaby International</title>
<style>
:root {
  --bg: #faf8ef;
  --text: #776e65;
  --board: #bbada0;
  --tile: #eee4da;
  --accent: #f67c5f;
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --text: #f5f5f5;
  --board: #2d2d2d;
  --tile: #3d3d3d;
  --accent: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  transition: 0.3s;
}
.header { text-align: center; margin-bottom: 15px; }
h1 { font-size: 48px; font-weight: bold; }
.subtitle { font-size: 14px; color: var(--accent); margin-top: 5px; }
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
.scoreboard { display: flex; gap: 15px; margin-bottom: 15px; }
.score-box {
  background: var(--board);
  color: white;
  padding: 10px 15px;
  border-radius: 5px;
  text-align: center;
  min-width: 80px;
}
.game-container {
  width: 400px;
  height: 400px;
  background: var(--board);
  border-radius: 10px;
  padding: 10px;
  position: relative;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.tile {
  width: 87px;
  height: 87px;
  background: var(--tile);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
}
footer {
  margin-top: 30px;
  font-size: 12px;
  text-align: center;
  color: var(--text);
  opacity: 0.7;
}
.game-over {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(238, 228, 218, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  border-radius: 10px;
  display: none;
}
@media (max-width: 420px) {
.game-container { width: 320px; height: 320px; }
.tile { width: 67px; height: 67px; font-size: 24px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>Merge 2048</h1>
  <p class="subtitle" id="subtitle">Made by Gaby International</p>
</div>
<div class="controls">
  <button id="themeBtn">🌙 Dark</button>
  <button id="undoBtn">↩ Undo</button>
  <button id="restartBtn">🔄 Restart</button>
  <button id="challengeBtn">📅 Daily</button>
  <button id="shareBtn">📤 Share</button>
</div>
<div class="scoreboard">
  <div class="score-box">
    <div>Score</div>
    <div id="score">0</div>
  </div>
  <div class="score-box">
    <div>Best</div>
    <div id="bestScore">0</div>
  </div>
</div>
<div class="game-container">
  <div class="grid" id="grid"></div>
  <div class="game-over" id="gameOver">
    <div>Game Over!</div>
    <button onclick="initGame()">Play Again</button>
  </div>
</div>
<footer>© 2026 Gaby International | Merge 2048</footer>
<script>
let board = [];
let score = 0;
let bestScore = localStorage.getItem('bestScore') || 0;
let history = [];
let gameOver = false;

const themeBtn = document.getElementById('themeBtn');
const savedTheme = localStorage.getItem('theme') || 'light';
document.body.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark'? '☀️ Light' : '🌙 Dark';
themeBtn.onclick = () => {
  const newTheme = document.body.getAttribute('data-theme') === 'dark'? 'light' : 'dark';
  document.body.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  themeBtn.textContent = newTheme === 'dark'? '☀️ Light' : '🌙 Dark';
};

document.getElementById('bestScore').textContent = bestScore;

function initGame() {
  board = Array(4).fill().map(() => Array(4).fill(0));
  score = 0;
  gameOver = false;
  history = [];
  addTile();
  addTile();
  render();
  document.getElementById('gameOver').style.display = 'none';
}

function addTile() {
  const empty = [];
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      if (board[i][j] === 0) empty.push([i, j]);
    }
  }
  if (empty.length > 0) {
    const [i, j] = empty[Math.floor(Math.random() * empty.length)];
    board[i][j] = Math.random() < 0.9? 2 : 4;
  }
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      const val = board[i][j];
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = val > 0? val : '';
      tile.style.backgroundColor = val > 0? getTileColor(val) : 'var(--tile)';
      grid.appendChild(tile);
    }
  }
  document.getElementById('score').textContent = score;
}

function getTileColor(val) {
  const colors = {
    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
    32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
    512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
  };
  return colors[val] || '#3c3a32';
}

function move(direction) {
  if (gameOver) return;
  
  let moved = false;
  let newBoard = JSON.parse(JSON.stringify(board));

  if (direction === 'left' || direction === 'right') {
    for (let i = 0; i < 4; i++) {
      let row = newBoard[i].filter(x => x!== 0);
      if (direction === 'right') row.reverse();
      
      for (let j = 0; j < row.length - 1; j++) {
        if (row[j] === row[j + 1]) {
          row[j] *= 2;
          score += row[j];
          row[j + 1] = 0;
        }
      }
      row = row.filter(x => x!== 0);
      while (row.length < 4) row.push(0);
      if (direction === 'right') row.reverse();
      
      if (JSON.stringify(row)!== JSON.stringify(newBoard[i])) moved = true;
      newBoard[i] = row;
    }
  }

  if (direction === 'up' || direction === 'down') {
    for (let j = 0; j < 4; j++) {
      let col = [];
      for (let i = 0; i < 4; i++) col.push(newBoard[i][j]);
      col = col.filter(x => x!== 0);
      if (direction === 'down') col.reverse();
      
      for (let i = 0; i < col.length - 1; i++) {
        if (col[i] === col[i + 1]) {
          col[i] *= 2;
          score += col[i];
          col[i + 1] = 0;
        }
      }
      col = col.filter(x => x!== 0);
      while (col.length < 4) col.push(0);
      if (direction === 'down') col.reverse();
      
      for (let i = 0; i < 4; i++) {
        if (newBoard[i][j]!== col[i]) moved = true;
        newBoard[i][j] = col[i];
      }
    }
  }

  if (moved) {
    board = newBoard;
    addTile();
    render();
    checkGameOver();
  }
}

function checkGameOver() {
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      if (board[i][j] === 0) return;
      if (j < 3 && board[i][j] === board[i][j + 1]) return;
      if (i < 3 && board[i][j] === board[i + 1][j]) return;
    }
  }
  gameOver = true;
  document.getElementById('gameOver').style.display = 'flex';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') move('left');
  if (e.key === 'ArrowRight') move('right');
  if (e.key === 'ArrowUp') move('up');
  if (e.key === 'ArrowDown') move('down');
});

document.getElementById('restartBtn').onclick = initGame;

let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    move(dx > 0? 'right' : 'left');
  } else if (Math.abs(dy) > 30) {
    move(dy > 0? 'down' : 'up');
  }
});

initGame();
</script>
</body>
</html>
